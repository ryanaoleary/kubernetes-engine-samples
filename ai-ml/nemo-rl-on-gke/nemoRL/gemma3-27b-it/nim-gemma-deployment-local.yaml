apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-gemma-3-27b-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nim-gemma-3-27b-server
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
      labels:
        app: nim-gemma-3-27b-server
    spec:
      
      tolerations:
      - key: "sku"
        operator: "Equal"
        value: "nvidia-h100-mega-80gb"
        effect: "NoSchedule"
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-h100-mega-80gb
      
      containers:
        - name: nim-gemma-3-27b-container
          image: nvcr.io/nim/nvidia/llm-nim:latest
          resources:
            limits:
              nvidia.com/gpu: "8"
            requests:
              nvidia.com/gpu: "8"
          env:
            - name: NGC_API_KEY
              value: "nvapi-NVKEY"
            - name: NIM_TENSOR_PARALLEL_SIZE
              value: "2"
            - name: NIM_MODEL_NAME
              value: "/data/nemo_rl_gemma3_25b_2_27/hf"
            - name: NIM_MAX_IMAGES_PER_PROMPT
              value: "0"
            - name: NIM_SERVED_MODEL_NAME
              value: "google/gemma-3-27b-it"
            - name: HF_TOKEN
              value: "HF_TOKEN"
            - name: NIM_LOG_LEVEL
              value: "TRACE"
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /data
              name: lustre-data
      imagePullSecrets:
        - name: ngc-secret
      volumes:
        - name: lustre-data
          persistentVolumeClaim:
            claimName: lustre-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "128Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: nim-gemma-3-27b-service
spec:
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  selector:
    app: nim-gemma-3-27b-server

# --- Testing the Deployment ---

# 1. Port-forward the service to your local machine:
#    (This allows you to access the service on localhost)
#
#    kubectl port-forward service/nim-gemma-3-27b-service 8000:8000

# 2. List the available models:
#    (Verify that the model is loaded and available)
#
#    curl -s http://localhost:8000/v1/models | jq .

# 3. Run inference:
#    (Send a request to the model to get a completion)
#
#    curl -X 'POST' \
#      'http://localhost:8000/v1/completions' \
#      -H 'accept: application/json' \
#      -H 'Content-Type: application/json' \
#      -d '{
#        "model": "google/gemma-3-27b-it",
#        "prompt": "Once upon a time",
#        "max_tokens": 64
#      }'

